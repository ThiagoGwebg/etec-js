<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora do IMC</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="container">
        <h1>Calculadora do IMC</h1>
        <p>Descrubra o seu indece de Massa Corporal</p>

        <form id="imc-form">
            <div class="input-group">
                <label for="peso">Peso (kg):</label>
                <input type="number" id="peso" step="0.1" placeholder="Ex: 70.5" required>
            </div>

            <div class="input-group">
                <label>Altura (m)</label>
                <input type="number" id="altura" step="0.1" placeholder="Ex: 1.75" required>
            </div>

            <button type="submit">Calcular IMC</button>
        </form>

        <div id="resultado" class="escondido">
            <!-- O resultado vai aparecer aqui via JavaScript -->
        </div>

    </div>

    <script src="js/script.js"></script>
</body>

</html>
